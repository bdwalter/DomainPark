<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenContext</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #333;
            background: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 2rem;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #2a5a8c;
            margin-bottom: 1rem;
        }

        p {
            font-size: 1.2rem;
            color: #666;
            max-width: 600px;
            line-height: 1.6;
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: #999;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <main>
        <img src="images/logo.png" alt="OpenContext logo" style="max-width: 320px; margin-bottom: 2rem;">
        <p>This domain and IP may be available for sale.</p>
        <p>Contact <a href="mailto:domain@opencontext.com">domain@opencontext.com</a> for details.</p>
    </main>
    <footer>
        &copy; 2026 OpenContext
    </footer>
</body>
</html>
